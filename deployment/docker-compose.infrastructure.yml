version: '3.8'

# Infrastructure services only - Redis and Gluetun
# API and Worker run as PM2 services for better performance

services:
  redis:
    image: redis:7-alpine
    container_name: retakt-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    mem_limit: 512m
    mem_reservation: 256m
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - retakt-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  gluetun:
    image: qmcgaw/gluetun
    container_name: retakt-gluetun
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=1
    environment:
      - VPN_SERVICE_PROVIDER=custom
      - VPN_TYPE=wireguard
      - WIREGUARD_ENDPOINT_IP=162.159.192.1
      - WIREGUARD_ENDPOINT_PORT=2408
      - WIREGUARD_PUBLIC_KEY=bmXOC+F1FxEMF9dyiK2H5/1SUtzH0JuVo51h2wPfgyo=
      - WIREGUARD_PRIVATE_KEY=MCDbEEszP03GUM20lpHOGFjZ0QIm6BNyDNwdREaVTkw=
      - WIREGUARD_ALLOWED_IPS=0.0.0.0/0
      - WIREGUARD_ADDRESSES=172.16.0.2/32
    mem_limit: 128m
    mem_reservation: 64m
    networks:
      - retakt-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://1.1.1.1"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  redis-data:
    driver: local

networks:
  retakt-network:
    driver: bridge
    name: retakt-network
