# Background Monitor Configuration
# Settings for the 24/7 service monitoring daemon

# Check interval in seconds
CHECK_INTERVAL=30

# Log file settings
LOG_DIR=logs
LOG_FILE=ai-monitor.log
LOG_MAX_LINES=2000

# PID file
PID_FILE=logs/ai-monitor.pid

# Working directory
WORK_DIR=/workspace/host/var/www/retakt

# Timeout for HTTP checks (seconds)
HTTP_TIMEOUT=5

# Retry settings
MAX_RETRIES=3
RETRY_DELAY=2

# Alert thresholds
SLOW_THRESHOLD_MS=1000
WARN_THRESHOLD_MS=2000

# Enable/disable features
ENABLE_SYSTEM_RESOURCES=true
ENABLE_NETWORK_DIAGNOSTICS=true
ENABLE_LOG_ROTATION=true
